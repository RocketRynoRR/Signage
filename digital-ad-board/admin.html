<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Digital Ad Board Admin</title>
    <link rel="stylesheet" href="assets/css/ad-board.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="admin-page">
    <header class="admin-header">
      <div class="brand-header">
        <div id="headerLogoPreview" class="header-logo-preview" hidden>
          <img id="headerLogoImage" alt="Active logo preview">
        </div>
        <div>
          <p class="eyebrow">Digital Ad Board</p>
          <h1>Admin</h1>
        </div>
      </div>
      <nav class="admin-actions">
        <button id="slidesViewButton" class="button ghost is-selected" type="button">Slides</button>
        <button id="tagsViewButton" class="button ghost" type="button">Tags</button>
        <button id="settingsViewButton" class="button ghost" type="button">Settings</button>
        <a class="button ghost" href="display.html" target="_blank" rel="noreferrer">Open Display</a>
        <button id="signOutButton" class="button ghost" type="button" hidden>Sign Out</button>
      </nav>
    </header>

    <main class="admin-shell">
      <section id="loginPanel" class="panel auth-panel">
        <h2>Sign In</h2>
        <form id="loginForm" class="form-grid">
          <label>
            Email
            <input id="emailInput" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="passwordInput" type="password" autocomplete="current-password" required>
          </label>
          <button class="button primary" type="submit">Sign In</button>
        </form>
      </section>

      <section id="adminPanel" class="admin-layout" hidden>
        <section id="slidesView" class="admin-view admin-view-active">
          <aside class="admin-sidebar">
            <section class="panel">
              <h2>Add Slide</h2>
              <form id="slideForm" class="form-grid">
                <label>
                  Image
                  <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif" required>
                </label>
                <label>
                  Header
                  <input id="headerInput" type="text" maxlength="120" placeholder="Fresh arrivals today">
                </label>
                <label>
                  Caption
                  <textarea id="captionInput" maxlength="280" rows="3" placeholder="Ask our team for details."></textarea>
                </label>
                <label>
                  Tags
                  <input id="tagsInput" type="text" maxlength="160" placeholder="stickers, vinyl, sale">
                </label>
                <div class="form-row">
                  <label>
                    Duration
                    <input id="durationInput" type="number" min="3" max="120" value="8">
                  </label>
                  <label>
                    Overlay
                    <select id="overlayInput">
                      <option value="random" selected>Random Each Time</option>
                      <option value="bottom">Bottom Bar</option>
                      <option value="top-left">Top Left</option>
                      <option value="center">Center</option>
                      <option value="minimal">Minimal</option>
                    </select>
                  </label>
                </div>
                <label class="checkbox-label">
                  <input id="activeInput" type="checkbox" checked>
                  Active on display
                </label>
                <button class="button primary" type="submit">Upload Slide</button>
              </form>
            </section>
          </aside>

          <section class="panel slides-panel">
            <div class="panel-title-row">
              <h2>Slides</h2>
              <button id="refreshButton" class="button ghost" type="button">Refresh</button>
            </div>
            <div id="slideList" class="slide-list"></div>
          </section>
        </section>

        <section id="settingsView" class="settings-view" hidden>
          <section class="panel settings-panel">
            <h2>Board Colours</h2>
            <form id="boardSettingsForm" class="form-grid">
              <div id="brandColourList" class="brand-colour-list"></div>
              <button id="addBrandColourButton" class="button ghost" type="button">Add Colour</button>
              <div id="boardPreview" class="board-preview">
                <span></span>
              </div>
              <button class="button primary" type="submit">Save Board Colours</button>
            </form>
          </section>

          <section class="panel settings-panel">
            <h2>Logo Settings</h2>
            <form id="logoForm" class="form-grid">
              <label>
                Logo Image
                <input id="logoInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" required>
              </label>
              <label>
                Logo Name
                <input id="logoNameInput" type="text" maxlength="80" placeholder="Main logo">
              </label>
              <label class="checkbox-label">
                <input id="logoActiveInput" type="checkbox" checked>
                Active on display
              </label>
              <button class="button primary" type="submit">Upload Logo</button>
            </form>
          </section>

          <section class="panel settings-panel">
            <div class="panel-title-row">
              <h2>Uploaded Logos</h2>
              <button id="refreshLogosButton" class="button ghost" type="button">Refresh</button>
            </div>
            <div id="logoList" class="logo-list"></div>
          </section>
        </section>

        <section id="tagsView" class="settings-view" hidden>
          <section class="panel settings-panel">
            <h2>Add Tag</h2>
            <form id="tagForm" class="form-grid">
              <label>
                Tag
                <input id="tagNameInput" type="text" maxlength="80" placeholder="stickers" required>
              </label>
              <label>
                Header
                <input id="tagHeaderInput" type="text" maxlength="120" placeholder="Die Cut Stickers">
              </label>
              <label>
                Caption
                <textarea id="tagCaptionInput" maxlength="280" rows="3" placeholder="Premium quality vinyl."></textarea>
              </label>
              <div class="form-row">
                <label>
                  Min Images
                  <input id="tagMinImagesInput" type="number" min="1" max="3" value="1">
                </label>
                <label>
                  Max Images
                  <input id="tagMaxImagesInput" type="number" min="1" max="3" value="3">
                </label>
              </div>
              <label>
                Overlay
                <select id="tagOverlayInput">
                  <option value="random" selected>Random Each Time</option>
                  <option value="bottom">Bottom Bar</option>
                  <option value="top-left">Top Left</option>
                  <option value="center">Center</option>
                  <option value="minimal">Minimal</option>
                </select>
              </label>
              <label class="checkbox-label">
                <input id="tagActiveInput" type="checkbox" checked>
                Active
              </label>
              <button class="button primary" type="submit">Save Tag</button>
            </form>
          </section>

          <section class="panel settings-panel">
            <div class="panel-title-row">
              <h2>Tag Captions</h2>
              <button id="refreshTagsButton" class="button ghost" type="button">Refresh</button>
            </div>
            <div id="tagList" class="tag-list"></div>
          </section>
        </section>
      </section>

      <section id="messageArea" class="message-area" aria-live="polite"></section>
    </main>

    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/admin.js"></script>
  </body>
</html>
